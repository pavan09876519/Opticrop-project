<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OptiCrop</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

<header>
    <div class="logo">🌱 OptiCrop</div>

    <nav>
        <a href="#home">Home</a>
        <a href="#about">About</a>
        <a href="#features">Features</a>
        <a href="#predict">Prediction</a>
        <a href="#contact">Contact</a>
    </nav>
</header>

<section class="hero" id="home">
    <div class="hero-content">
        <h1>Smart Agricultural Production Optimization Engine</h1>

        <p>
            AI-powered crop recommendation system using Machine Learning.
        </p>

        <a href="#predict" class="btn">Predict Crop</a>
    </div>
</section>

<section id="predict" class="prediction">

<h2>Crop Prediction</h2>

<form action="/predict" method="POST">

<input type="number" name="N" placeholder="Nitrogen" required>

<input type="number" name="P" placeholder="Phosphorus" required>

<input type="number" name="K" placeholder="Potassium" required>

<input type="number" step="0.1" name="temperature" placeholder="Temperature" required>

<input type="number" step="0.1" name="humidity" placeholder="Humidity" required>

<input type="number" step="0.1" name="ph" placeholder="pH" required>

<input type="number" step="0.1" name="rainfall" placeholder="Rainfall" required>

<button type="submit">Predict Crop</button>

</form>

{% if prediction %}

<div class="result-card">

<h2>Recommended Crop</h2>

<h1>{{ prediction }}</h1>

</div>

{% endif %}

</section>

</body>
</html>
